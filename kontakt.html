<style>
  :root { --cream:#EFE6D6; --cream-deep:#E8D8C2; --sand-line:#D2BE9F; --night:#241D22; --ink:#322B24; --ink-soft:#645A4B; --amber:#9E6B41; --amber-soft:#C0966B; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--cream); color:var(--ink); font-family:'Jost',sans-serif; font-weight:400; line-height:1.72; -webkit-font-smoothing:antialiased; }
  ::selection { background:var(--amber); color:var(--cream); }
  .serif { font-family:'Cormorant Garamond',serif; }
  nav { position:fixed; top:0; left:0; right:0; display:flex; justify-content:space-between; align-items:center; padding:18px 44px; z-index:20; background:rgba(239,230,214,0.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--sand-line); }
  nav .left { display:flex; align-items:center; gap:26px; }
  nav .wordmark { letter-spacing:0.42em; font-size:18px; color:var(--ink); text-indent:0.42em; text-decoration:none; }
  nav .back { font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-soft); text-decoration:none; transition:color .3s; }
  nav .back:hover { color:var(--amber); }
  nav .back__icon { display:none; font-size:20px; line-height:1; }
  nav .lang { display:flex; align-items:center; gap:10px; }
  nav .lang button { background:none; border:none; cursor:pointer; font-family:'Jost',sans-serif; font-size:14px; font-weight:500; letter-spacing:0.1em; color:var(--ink-soft); padding:3px 2px; transition:color .3s; }
  nav .lang button.active { color:var(--ink); border-bottom:1.5px solid var(--amber); }
  nav .lang button:hover { color:var(--ink); }
  nav .lang span { color:var(--ink-soft); }
  main { max-width:760px; margin:0 auto; padding:160px 28px 100px; }
  .eyebrow { font-size:12px; letter-spacing:0.32em; text-transform:uppercase; color:var(--amber); font-weight:500; }
  h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(34px,5vw,52px); font-weight:400; line-height:1.1; margin:18px 0 40px; }
  h2 { font-family:'Cormorant Garamond',serif; font-size:25px; font-weight:500; margin:44px 0 14px; }
  p { color:var(--ink-soft); margin-bottom:16px; max-width:640px; }
  p strong { color:var(--ink); font-weight:500; }
  a { color:var(--amber); }
  ul { margin:0 0 16px 20px; color:var(--ink-soft); max-width:620px; }
  li { margin-bottom:6px; }
  .placeholder { background:var(--cream-deep); border:1px dashed var(--amber-soft); padding:2px 8px; color:var(--ink); font-size:0.95em; }
  .note { margin:48px 0 0; padding:18px 22px; border-left:2px solid var(--amber); background:var(--cream-deep); font-size:14px; color:var(--ink-soft); }
  .lead { font-size:19px; color:var(--ink); max-width:640px; margin-bottom:28px; }
  footer { border-top:1px solid var(--sand-line); padding:40px 44px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:14px; }
  footer span, footer a { font-size:13px; color:var(--ink-soft); text-decoration:none; }
  footer a { margin-left:22px; }
  footer a:hover { color:var(--amber); }
  @media (max-width:720px) { nav { padding:16px 22px; } nav .left { gap:14px; } nav .back__full { display:none; } nav .back__icon { display:inline; } main { padding:130px 22px 70px; } footer { padding:32px 22px; } footer a { margin-left:0; margin-right:18px; } }
</style>

<body>
<nav>
  <div class="left">
    <a href="index.html" class="wordmark">HESPYRA</a>
    <a href="index.html" class="back" aria-label="Zurück zur Seite"><span class="back__full" data-en="Back to site">Zurück zur Seite</span><span class="back__icon" aria-hidden="true">←</span></a>
  </div>
  <div class="lang" role="group" aria-label="Sprache">
    <button class="active" aria-current="true">DE</button><span>/</span><button>EN</button>
  </div>
</nav>
<main>
  <p class="eyebrow" data-en="HESPYRA">HESPYRA</p>
  <h1 class="serif" data-en="Contact">Kontakt</h1>
  <p class="lead" data-en="We’d love to hear from you – we reply as quickly as possible.">Wir freuen uns, von dir zu hören – wir antworten so schnell wie möglich.</p>
<form action="kontakt.php" method="post" style="max-width:520px; margin-top:32px;">
  <div style="margin-bottom:18px;">
    <label for="kf-name" style="display:block; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:8px;" data-en="Your name">Dein Name</label>
    <input id="kf-name" name="name" type="text" required placeholder="Anna Schmidt" data-en-ph="Anna Smith" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--ink); padding:10px 2px; font-family:'Jost',sans-serif; font-size:16px; color:var(--ink); outline:none;" />
  </div>
  <div style="margin-bottom:18px;">
    <label for="kf-email" style="display:block; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:8px;" data-en="Your email address">Deine E-Mail-Adresse</label>
    <input id="kf-email" name="email" type="email" required placeholder="anna@example.com" style="width:100%; background:transparent; border:none; border-bottom:1px solid var(--ink); padding:10px 2px; font-family:'Jost',sans-serif; font-size:16px; color:var(--ink); outline:none;" />
  </div>
  <div style="margin-bottom:22px;">
    <label for="kf-message" style="display:block; font-size:13px; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:8px;" data-en="Your message">Deine Nachricht</label>
    <textarea id="kf-message" name="message" required rows="5" placeholder="Schreibe hier deine Nachricht an uns..." data-en-ph="Write your message to us here..." style="width:100%; background:transparent; border:1px solid var(--sand-line); padding:12px; font-family:'Jost',sans-serif; font-size:16px; color:var(--ink); outline:none; resize:vertical;"></textarea>
  </div>
  <!-- Honeypot: für Menschen unsichtbar, nur Bots füllen es aus -->
  <div style="position:absolute; left:-9999px; top:-9999px;" aria-hidden="true">
    <label>Bitte dieses Feld leer lassen<input type="text" name="website" tabindex="-1" autocomplete="off" /></label>
  </div>
  <label style="display:flex; align-items:flex-start; gap:10px; margin-bottom:24px; font-size:13px; color:var(--ink-soft); cursor:pointer; line-height:1.55;">
    <input type="checkbox" name="consent" required style="margin-top:4px;" />
    <span data-en="I agree that my details will be used to process my enquiry. More in the &lt;a href=&quot;datenschutz.html&quot; style=&quot;color:var(--amber);&quot;&gt;privacy policy&lt;/a&gt;.">Ich bin einverstanden, dass meine Angaben zur Bearbeitung meiner Anfrage verwendet werden. Mehr in der <a href="datenschutz.html" style="color:var(--amber);">Datenschutzerklärung</a>.</span>
  </label>
  <button type="submit" data-en="Send message" style="background:var(--ink); color:var(--cream); border:none; padding:14px 28px; font-family:'Jost',sans-serif; font-size:12px; letter-spacing:0.18em; text-transform:uppercase; cursor:pointer;">Nachricht senden</button>
</form>
</main>

    <a href="impressum.html" data-en="Imprint">Impressum</a>
  </div>
</footer>
<script>
  (function(){
    var btns=document.querySelectorAll('.lang button');
    document.querySelectorAll('[data-en]').forEach(function(el){el.setAttribute('data-de',el.innerHTML);});
    document.querySelectorAll('[data-en-ph]').forEach(function(el){el.setAttribute('data-de-ph',el.getAttribute('placeholder')||'');});
    function setLang(l){
      document.documentElement.lang=l;
      document.querySelectorAll('[data-en]').forEach(function(el){var v=el.getAttribute(l==='en'?'data-en':'data-de');if(v!==null)el.innerHTML=v;});
      document.querySelectorAll('[data-en-ph]').forEach(function(el){var v=el.getAttribute(l==='en'?'data-en-ph':'data-de-ph');if(v!==null)el.setAttribute('placeholder',v);});
      btns.forEach(function(b){var a=b.textContent.trim().toLowerCase()===l;b.classList.toggle('active',a);if(a)b.setAttribute('aria-current','true');else b.removeAttribute('aria-current');});
      try{sessionStorage.setItem('hespyra_lang',l);}catch(e){}
    }
    btns.forEach(function(b){b.addEventListener('click',function(){setLang(b.textContent.trim().toLowerCase());});});
    var s='de';try{s=sessionStorage.getItem('hespyra_lang')||'de';}catch(e){}
    if(s==='en')setLang('en');
  })();
</script>
</body>
